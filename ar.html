<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Пятигорск · AR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #C9A84C; --dark: #0D0B08; --cream: #F0E6D0; --sepia: #8B6B3D;
    }
    body { background: #000; font-family: 'Jost', sans-serif; color: var(--cream); overflow: hidden; }

    /* A-Frame fills everything */
    a-scene { display: block; }

    /* Back button */
    #back-btn {
      position: fixed; top: 16px; left: 16px; z-index: 999;
      background: rgba(13,11,8,0.75); border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold); font-family: 'Jost', sans-serif;
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      padding: 10px 18px; cursor: pointer; backdrop-filter: blur(8px);
      text-decoration: none; display: flex; align-items: center; gap: 8px;
    }

    /* Top right label */
    #found-label {
      position: fixed; top: 16px; right: 16px; z-index: 999;
      background: rgba(13,11,8,0.75); border: 1px solid rgba(201,168,76,0.2);
      color: var(--sepia); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
      padding: 10px 14px; backdrop-filter: blur(8px);
      transition: color 0.3s, border-color 0.3s;
    }
    #found-label.found { color: var(--gold); border-color: rgba(201,168,76,0.5); }

    /* Scanning reticle */
    #reticle {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 160px; height: 160px; pointer-events: none; z-index: 999;
      transition: opacity 0.4s;
    }
    .rc { position: absolute; width: 20px; height: 20px; border-color: var(--gold); border-style: solid; animation: rp 2s ease-in-out infinite; }
    .rc.tl { top:0; left:0;   border-width: 2px 0 0 2px; }
    .rc.tr { top:0; right:0;  border-width: 2px 2px 0 0; }
    .rc.bl { bottom:0; left:0;  border-width: 0 0 2px 2px; }
    .rc.br { bottom:0; right:0; border-width: 0 2px 2px 0; }
    @keyframes rp { 0%,100%{opacity:0.3} 50%{opacity:0.9} }

    /* Bottom hint */
    #hint {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
      padding: 20px 24px 32px;
      background: linear-gradient(to top, rgba(13,11,8,0.85), transparent);
      text-align: center; pointer-events: none;
    }
    #hint-main { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(240,230,208,0.5); }
    #hint-links { margin-top: 8px; font-size: 11px; color: rgba(240,230,208,0.3); pointer-events: auto; }
    #hint-links a { color: var(--gold); text-decoration: none; }

    /* Info card */
    #card {
      position: fixed; bottom: -300px; left: 12px; right: 12px; z-index: 999;
      background: rgba(13,11,8,0.96); border: 1px solid rgba(201,168,76,0.2);
      padding: 20px; backdrop-filter: blur(16px);
      transition: bottom 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }
    #card.show { bottom: 20px; }
    #card-tag { font-size: 8px; letter-spacing: 4px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
    #card-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; color: var(--cream); }
    #card-year  { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-style: italic; color: var(--sepia); margin-bottom: 10px; }
    #card-text  { font-size: 12px; font-weight: 300; line-height: 1.8; color: rgba(240,230,208,0.6); margin-bottom: 14px; }
    #card-actions { display: flex; gap: 10px; }
    .card-btn {
      flex: 1; padding: 11px; background: none;
      border: 1px solid rgba(201,168,76,0.25); color: var(--gold);
      font-family: 'Jost', sans-serif; font-size: 9px; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer; transition: background 0.2s;
    }
    .card-btn:hover { background: rgba(201,168,76,0.1); }
    .card-btn.playing { background: rgba(201,168,76,0.15); border-color: var(--gold); }
    #card-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: 1px solid rgba(201,168,76,0.15);
      color: rgba(240,230,208,0.4); width: 26px; height: 26px;
      cursor: pointer; font-size: 14px;
    }

    /* Audio wave */
    .wave { display: inline-flex; align-items: center; gap: 2px; height: 12px; vertical-align: middle; margin-right: 4px; }
    .wave span { display: inline-block; width: 2px; background: var(--gold); border-radius: 1px; animation: wv 0.7s ease-in-out infinite; }
    .wave span:nth-child(2){animation-delay:.1s}
    .wave span:nth-child(3){animation-delay:.2s}
    .wave span:nth-child(4){animation-delay:.3s}
    @keyframes wv { 0%,100%{height:3px} 50%{height:12px} }
  </style>
</head>
<body>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  renderer="logarithmicDepthBuffer: true; antialias: true;"
  vr-mode-ui="enabled: false">

  <!-- МАРКЕР HIRO → Домик Лермонтова -->
  <a-marker preset="hiro" id="m-hiro" emitevents="true">
    <a-box position="0 .05 0" width="2.2" height=".08" depth="2.2" color="#1A1611" opacity=".95"></a-box>
    <a-box position="0 .12 1.05" width="2.2" height=".05" depth=".05" color="#C9A84C" opacity=".7"></a-box>
    <a-box position="0 .12 -1.05" width="2.2" height=".05" depth=".05" color="#C9A84C" opacity=".7"></a-box>
    <a-box position="1.05 .12 0" width=".05" height=".05" depth="2.2" color="#C9A84C" opacity=".7"></a-box>
    <a-box position="-1.05 .12 0" width=".05" height=".05" depth="2.2" color="#C9A84C" opacity=".7"></a-box>
    <a-cylinder position="0 .6 0" radius=".05" height="1.1" color="#C9A84C" opacity=".5"></a-cylinder>
    <a-plane position="0 1.35 0" rotation="-90 0 0" width="2" height="1.1" color="#0D0B08" opacity=".95"></a-plane>
    <a-plane position="0 1.44 0" rotation="-90 0 0" width="1.85" height=".025" color="#C9A84C" opacity=".5"></a-plane>
    <a-plane position="0 .8 0"  rotation="-90 0 0" width="1.85" height=".025" color="#C9A84C" opacity=".5"></a-plane>
    <a-text value="ДОМИК ЛЕРМОНТОВА" position="0 1.33 .01" rotation="-90 0 0" align="center" color="#C9A84C" width="3.2" font="mozillavr"></a-text>
    <a-text value="1841 год" position="0 1.17 .01" rotation="-90 0 0" align="center" color="#8B6B3D" width="2.5" font="mozillavr"></a-text>
    <a-text value="Последнее место жительства М. Ю. Лермонтова" position="0 1.02 .01" rotation="-90 0 0" align="center" color="#F0E6D0" width="2.8" font="mozillavr" line-height="55"></a-text>
    <a-box position=".85 .2 .85"  width=".1" height=".2" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 360 0;dur:4000;loop:true;easing:linear"></a-box>
    <a-box position="-.85 .2 .85" width=".1" height=".2" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 360 0;dur:5500;loop:true;easing:linear"></a-box>
    <a-box position=".85 .2 -.85" width=".1" height=".2" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 -360 0;dur:4800;loop:true;easing:linear"></a-box>
    <a-box position="-.85 .2 -.85" width=".1" height=".2" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 -360 0;dur:3700;loop:true;easing:linear"></a-box>
  </a-marker>

  <!-- МАРКЕР KANJI → Эолова Арфа -->
  <a-marker preset="kanji" id="m-kanji" emitevents="true">
    <a-box position="0 .05 0" width="2.2" height=".08" depth="2.2" color="#0D1A1A" opacity=".95"></a-box>
    <a-cylinder position="0 .5 0" radius=".5" height=".06" color="#1A3A3A" opacity=".8"></a-cylinder>
    <a-cylinder position="0 1.1 0" radius=".04" height="1.2" color="#4ABFBF" opacity=".6"></a-cylinder>
    <a-torus position="0 1.7 0" radius=".55" radius-tubular=".02" color="#4ABFBF" opacity=".5" animation="property:rotation;to:0 360 0;dur:8000;loop:true;easing:linear"></a-torus>
    <a-sphere position="0 2.3 0" radius=".15" color="#4ABFBF" opacity=".7" animation="property:scale;to:1.3 1.3 1.3;dur:1500;dir:alternate;loop:true;easing:easeInOutSine"></a-sphere>
    <a-plane position="0 1.38 0" rotation="-90 0 0" width="2.1" height=".95" color="#051515" opacity=".9"></a-plane>
    <a-text value="ЭОЛОВА АРФА" position="0 1.35 .01" rotation="-90 0 0" align="center" color="#4ABFBF" width="3" font="mozillavr"></a-text>
    <a-text value="1831 год" position="0 1.19 .01" rotation="-90 0 0" align="center" color="#2A8080" width="2.5" font="mozillavr"></a-text>
    <a-text value="Беседка с арфой на горе Машук" position="0 1.04 .01" rotation="-90 0 0" align="center" color="#B0E0E0" width="2.8" font="mozillavr" line-height="55"></a-text>
  </a-marker>

  <!-- МАРКЕР BARCODE 0 → Провал -->
  <a-marker type="barcode" value="0" id="m-barcode0" emitevents="true">
    <a-box position="0 .05 0" width="2.2" height=".08" depth="2.2" color="#0D0818" opacity=".95"></a-box>
    <a-cylinder position="0 .7 0" radius=".4" height="1.4" color="#6A0F8E" opacity=".3" open-ended="true"></a-cylinder>
    <a-cylinder position="0 .7 0" radius=".55" height="1.4" color="#9B59B6" opacity=".15" open-ended="true"></a-cylinder>
    <a-sphere position="0 1.5 0" radius=".25" color="#9B59B6" opacity=".8" wireframe="true" animation="property:rotation;to:360 360 0;dur:6000;loop:true;easing:linear"></a-sphere>
    <a-plane position="0 1.38 0" rotation="-90 0 0" width="2.1" height=".95" color="#080512" opacity=".92"></a-plane>
    <a-text value="ПРОВАЛ" position="0 1.35 .01" rotation="-90 0 0" align="center" color="#9B59B6" width="3" font="mozillavr"></a-text>
    <a-text value="1837 год" position="0 1.19 .01" rotation="-90 0 0" align="center" color="#6A0F8E" width="2.5" font="mozillavr"></a-text>
    <a-text value="Подземное озеро синего цвета" position="0 1.04 .01" rotation="-90 0 0" align="center" color="#D7B4F3" width="2.8" font="mozillavr" line-height="55"></a-text>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<!-- UI поверх камеры -->
<a href="index.html" id="back-btn">← Назад</a>

<div id="found-label">Ищу маркер...</div>

<div id="reticle">
  <div class="rc tl"></div><div class="rc tr"></div>
  <div class="rc bl"></div><div class="rc br"></div>
</div>

<div id="hint">
  <div id="hint-main">Наведи камеру на маркер</div>
  <div id="hint-links">
    Тест-маркеры:
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">HIRO</a> ·
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/kanji.png" target="_blank">KANJI</a>
  </div>
</div>

<!-- Карточка объекта -->
<div id="card">
  <button id="card-close" onclick="closeCard()">✕</button>
  <div id="card-tag"></div>
  <div id="card-title"></div>
  <div id="card-year"></div>
  <p id="card-text"></p>
  <div id="card-actions">
    <button class="card-btn" id="audio-btn" onclick="toggleAudio()">🎧 Слушать рассказ</button>
  </div>
</div>

<script>
const PLACES = [
  {
    tag: 'Объект #01 · Литература',
    title: 'Домик Лермонтова',
    year: 'Пятигорск, 1841 год',
    text: 'Небольшой саманный домик, где Лермонтов провёл последние два месяца жизни. 15 июля 1841 года поэт был убит на дуэли у подножия горы Машук. Здесь написаны несколько поздних стихотворений. Сегодня работает музей-заповедник.',
    audio: 'Домик Лермонтова. Небольшой саманный домик, где Михаил Юрьевич Лермонтов провёл последние два месяца своей жизни. Пятнадцатого июля тысяча восемьсот сорок первого года поэт был убит на дуэли с Мартыновым у подножия горы Машук. Поэту было двадцать шесть лет. Сегодня в домике работает музей-заповедник.'
  },
  {
    tag: 'Объект #02 · Архитектура',
    title: 'Эолова Арфа',
    year: 'Пятигорск, 1831 год',
    text: 'Беседка-ротонда на обрыве горы Машук, построена братьями Бернардацци. Внутри была настоящая эолова арфа — инструмент, звучащий от ветра. В тихие ночи жители снизу слышали таинственную музыку.',
    audio: 'Эолова Арфа. Изящная беседка-ротонда на обрыве горы Машук, построенная архитекторами братьями Бернардацци в тысяча восемьсот тридцать первом году. Внутри была настоящая эолова арфа — инструмент, звучащий от ветра. В тихие ночи жители города снизу слышали таинственную музыку. Лермонтов упоминал это место в своих произведениях.'
  },
  {
    tag: 'Объект #03 · Природа',
    title: 'Провал',
    year: 'Пятигорск, карстовое озеро',
    text: 'Подземное карстовое озеро с водой пронзительно лазурного цвета. Глубина провала около 41 метра. В 1857 году прорыли тоннель. Остап Бендер из «Золотого телёнка» продавал здесь билеты.',
    audio: 'Провал. Уникальное подземное карстовое озеро с водой пронзительно синего цвета. Глубина — сорок один метр. Вода насыщена сероводородом, что придаёт ей необычный цвет. В тысяча восемьсот пятьдесят седьмом году прорыли тоннель. Остап Бендер из Золотого телёнка продавал здесь билеты на вход.'
  }
];

let currentPlace = null;
let speaking = false;

// Attach marker events
const scene = document.querySelector('a-scene');
scene.addEventListener('loaded', attachMarkers);
setTimeout(attachMarkers, 2500); // fallback

function attachMarkers() {
  [['m-hiro',0],['m-kanji',1],['m-barcode0',2]].forEach(([id, idx]) => {
    const el = document.getElementById(id);
    if (!el || el._markerAttached) return;
    el._markerAttached = true;
    el.addEventListener('markerFound', () => {
      document.getElementById('reticle').style.opacity = '0';
      document.getElementById('found-label').textContent = '✦ ' + PLACES[idx].title;
      document.getElementById('found-label').classList.add('found');
      showCard(idx);
    });
    el.addEventListener('markerLost', () => {
      document.getElementById('reticle').style.opacity = '1';
      document.getElementById('found-label').textContent = 'Ищу маркер...';
      document.getElementById('found-label').classList.remove('found');
    });
  });
}

function showCard(idx) {
  const p = PLACES[idx];
  currentPlace = p;
  document.getElementById('card-tag').textContent = p.tag;
  document.getElementById('card-title').textContent = p.title;
  document.getElementById('card-year').textContent = p.year;
  document.getElementById('card-text').textContent = p.text;
  resetAudio();
  document.getElementById('card').classList.add('show');
  // Auto-play audio after short delay
  setTimeout(() => speak(p.audio), 700);
}

function closeCard() {
  document.getElementById('card').classList.remove('show');
  stopAudio();
}

function toggleAudio() {
  if (speaking) stopAudio();
  else if (currentPlace) speak(currentPlace.audio);
}

function speak(text) {
  if (!window.speechSynthesis) return;
  stopAudio();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ru-RU'; u.rate = 0.88;
  const voices = speechSynthesis.getVoices();
  const ru = voices.find(v => v.lang.startsWith('ru'));
  if (ru) u.voice = ru;
  u.onend = u.onerror = resetAudio;
  speaking = true;
  const btn = document.getElementById('audio-btn');
  btn.classList.add('playing');
  btn.innerHTML = '<span class="wave"><span></span><span></span><span></span><span></span></span> Воспроизведение...';
  speechSynthesis.speak(u);
}

function stopAudio() {
  speechSynthesis.cancel();
  speaking = false;
  resetAudio();
}

function resetAudio() {
  speaking = false;
  const btn = document.getElementById('audio-btn');
  if (btn) { btn.classList.remove('playing'); btn.textContent = '🎧 Слушать рассказ'; }
}

if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
