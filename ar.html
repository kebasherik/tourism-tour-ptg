<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>AR Test</title>
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ar.js@2.2.2/aframe/build/aframe-ar.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; }
    #ui {
      position:fixed; bottom:0; left:0; right:0;
      padding:16px 20px 28px;
      background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      z-index:999; text-align:center;
      font-family:sans-serif; color:#fff; pointer-events:none;
    }
    #ui a { color:#C9A84C; pointer-events:auto; }
    #back {
      position:fixed; top:16px; left:16px; z-index:999;
      background:rgba(0,0,0,0.6); border:1px solid #C9A84C;
      color:#C9A84C; font-family:sans-serif; font-size:13px;
      padding:10px 18px; text-decoration:none;
    }
    #status {
      position:fixed; top:16px; right:16px; z-index:999;
      background:rgba(0,0,0,0.6); border:1px solid #555;
      color:#aaa; font-family:sans-serif; font-size:11px;
      padding:8px 12px;
    }
  </style>
</head>
<body>

<a-scene
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="antialias: true;">

  <a-marker preset="hiro" emitevents="true" id="m0">
    <a-box position="0 0.5 0" color="#C9A84C"
      animation="property:rotation; to:0 360 0; dur:3000; loop:true; easing:linear">
    </a-box>
    <a-text value="Домик Лермонтова" position="0 1.2 0" align="center" color="white" width="3"></a-text>
  </a-marker>

  <a-marker preset="kanji" emitevents="true" id="m1">
    <a-sphere position="0 0.6 0" radius="0.4" color="#4ABFBF"
      animation="property:scale; to:1.3 1.3 1.3; dur:1000; dir:alternate; loop:true">
    </a-sphere>
    <a-text value="Эолова Арфа" position="0 1.4 0" align="center" color="white" width="3"></a-text>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<a href="index.html" id="back">← Назад</a>
<div id="status">Загрузка AR...</div>
<div id="ui">
  Маркеры:
  <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">HIRO</a> ·
  <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/kanji.png" target="_blank">KANJI</a>
</div>

<script>
  const scene = document.querySelector('a-scene');
  const status = document.getElementById('status');
  scene.addEventListener('loaded', () => {
    status.textContent = 'Готов · ищу маркер...';
    status.style.borderColor = '#C9A84C';
    status.style.color = '#C9A84C';
  });
  ['m0','m1'].forEach((id, i) => {
    const names = ['Домик Лермонтова','Эолова Арфа'];
    document.getElementById(id).addEventListener('markerFound', () => { status.textContent = '✦ ' + names[i]; });
    document.getElementById(id).addEventListener('markerLost',  () => { status.textContent = 'Ищу маркер...'; });
  });
</script>
</body>
</html>
