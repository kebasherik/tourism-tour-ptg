<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Пятигорск · AR</title>
  <!-- Проверенная рабочая пара: aframe 1.3.0 + AR.js master -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; }

    #back {
      position:fixed; top:16px; left:16px; z-index:9999;
      background:rgba(13,11,8,0.8); border:1px solid rgba(201,168,76,0.5);
      color:#C9A84C; font-family:'Jost',sans-serif;
      font-size:11px; letter-spacing:3px; text-transform:uppercase;
      padding:10px 18px; text-decoration:none; backdrop-filter:blur(8px);
    }

    #status {
      position:fixed; top:16px; right:16px; z-index:9999;
      background:rgba(13,11,8,0.8); border:1px solid rgba(255,255,255,0.15);
      color:rgba(255,255,255,0.5); font-family:'Jost',sans-serif;
      font-size:10px; letter-spacing:2px; text-transform:uppercase;
      padding:10px 14px; backdrop-filter:blur(8px);
      transition:color .3s, border-color .3s;
    }
    #status.found { color:#C9A84C; border-color:rgba(201,168,76,0.5); }

    /* Прицел */
    #reticle {
      position:fixed; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:160px; height:160px;
      pointer-events:none; z-index:9999;
    }
    .rc { position:absolute; width:22px; height:22px; border-color:#C9A84C; border-style:solid; animation:rp 2s ease-in-out infinite; }
    .rc.tl { top:0; left:0;   border-width:2px 0 0 2px; }
    .rc.tr { top:0; right:0;  border-width:2px 2px 0 0; }
    .rc.bl { bottom:0; left:0;  border-width:0 0 2px 2px; }
    .rc.br { bottom:0; right:0; border-width:0 2px 2px 0; }
    @keyframes rp { 0%,100%{opacity:.3} 50%{opacity:.85} }

    /* Подсказка снизу */
    #hint {
      position:fixed; bottom:0; left:0; right:0; z-index:9999;
      padding:18px 24px 32px;
      background:linear-gradient(to top,rgba(0,0,0,.85),transparent);
      text-align:center; pointer-events:none;
      font-family:'Jost',sans-serif;
    }
    #hint-main { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:rgba(255,255,255,.45); }
    #hint-links { margin-top:8px; font-size:11px; color:rgba(255,255,255,.25); pointer-events:auto; }
    #hint-links a { color:#C9A84C; text-decoration:none; }

    /* Карточка объекта */
    #card {
      position:fixed; bottom:-320px; left:12px; right:12px; z-index:9999;
      background:rgba(13,11,8,.97); border:1px solid rgba(201,168,76,.2);
      backdrop-filter:blur(16px);
      transition:bottom .45s cubic-bezier(.34,1.56,.64,1);
    }
    #card.show { bottom:20px; }
    #card-head { padding:18px 20px 14px; border-bottom:1px solid rgba(201,168,76,.1); }
    #card-tag  { font-size:8px; letter-spacing:4px; text-transform:uppercase; color:#C9A84C; margin-bottom:6px; font-family:'Jost',sans-serif; }
    #card-title { font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:300; color:#F0E6D0; line-height:1; }
    #card-year  { font-family:'Cormorant Garamond',serif; font-size:13px; font-style:italic; color:#8B6B3D; margin-top:2px; }
    #card-body { padding:12px 20px 16px; }
    #card-text  { font-size:12px; font-weight:300; line-height:1.8; color:rgba(240,230,208,.6); font-family:'Jost',sans-serif; margin-bottom:14px; }
    #card-actions { display:flex; gap:10px; }
    .cbtn {
      flex:1; padding:11px; background:none;
      border:1px solid rgba(201,168,76,.25); color:#C9A84C;
      font-family:'Jost',sans-serif; font-size:9px; letter-spacing:3px;
      text-transform:uppercase; cursor:pointer; transition:background .2s;
    }
    .cbtn:hover { background:rgba(201,168,76,.1); }
    .cbtn.playing { background:rgba(201,168,76,.15); border-color:#C9A84C; }
    #card-close {
      position:absolute; top:12px; right:12px;
      background:none; border:1px solid rgba(201,168,76,.15);
      color:rgba(240,230,208,.35); width:26px; height:26px;
      cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center;
    }

    .wave { display:inline-flex; align-items:center; gap:2px; height:12px; vertical-align:middle; margin-right:4px; }
    .wave span { display:inline-block; width:2px; background:#C9A84C; border-radius:1px; animation:wv .7s ease-in-out infinite; }
    .wave span:nth-child(2){animation-delay:.1s}
    .wave span:nth-child(3){animation-delay:.2s}
    .wave span:nth-child(4){animation-delay:.3s}
    @keyframes wv { 0%,100%{height:3px} 50%{height:12px} }
  </style>
</head>
<body>

<a-scene
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; antialias: true;">

  <!-- МАРКЕР HIRO → Домик Лермонтова -->
  <a-marker preset="hiro" emitevents="true" id="m0">
    <a-box position="0 .05 0" width="2" height=".07" depth="2" color="#1A1611" opacity=".95"></a-box>
    <a-cylinder position="0 .55 0" radius=".05" height="1" color="#C9A84C" opacity=".6"></a-cylinder>
    <a-plane position="0 1.25 0" rotation="-90 0 0" width="1.9" height="1" color="#0D0B08" opacity=".95"></a-plane>
    <a-plane position="0 1.33 0" rotation="-90 0 0" width="1.75" height=".02" color="#C9A84C" opacity=".5"></a-plane>
    <a-plane position="0 .74 0" rotation="-90 0 0" width="1.75" height=".02" color="#C9A84C" opacity=".5"></a-plane>
    <a-text value="ДОМИК ЛЕРМОНТОВА" position="0 1.22 .01" rotation="-90 0 0" align="center" color="#C9A84C" width="3" font="mozillavr"></a-text>
    <a-text value="1841 год" position="0 1.07 .01" rotation="-90 0 0" align="center" color="#8B6B3D" width="2.3" font="mozillavr"></a-text>
    <a-text value="Последнее место жительства\nМ. Ю. Лермонтова" position="0 .93 .01" rotation="-90 0 0" align="center" color="#F0E6D0" width="2.6" font="mozillavr" line-height="55"></a-text>
    <a-box position=".8 .2 .8"  width=".1" height=".18" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 360 0;dur:4000;loop:true;easing:linear"></a-box>
    <a-box position="-.8 .2 .8" width=".1" height=".18" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 360 0;dur:5200;loop:true;easing:linear"></a-box>
    <a-box position=".8 .2 -.8" width=".1" height=".18" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 -360 0;dur:4600;loop:true;easing:linear"></a-box>
    <a-box position="-.8 .2 -.8" width=".1" height=".18" depth=".1" color="#C9A84C" opacity=".5" animation="property:rotation;to:0 -360 0;dur:3800;loop:true;easing:linear"></a-box>
  </a-marker>

  <!-- МАРКЕР KANJI → Эолова Арфа -->
  <a-marker preset="kanji" emitevents="true" id="m1">
    <a-box position="0 .05 0" width="2" height=".07" depth="2" color="#0D1A1A" opacity=".95"></a-box>
    <a-cylinder position="0 .5 0" radius=".45" height=".05" color="#1A3A3A" opacity=".8"></a-cylinder>
    <a-cylinder position="0 1.1 0" radius=".04" height="1.1" color="#4ABFBF" opacity=".6"></a-cylinder>
    <a-torus position="0 1.65 0" radius=".5" radius-tubular=".018" color="#4ABFBF" opacity=".5" animation="property:rotation;to:0 360 0;dur:7000;loop:true;easing:linear"></a-torus>
    <a-sphere position="0 2.2 0" radius=".14" color="#4ABFBF" opacity=".75" animation="property:scale;to:1.3 1.3 1.3;dur:1400;dir:alternate;loop:true;easing:easeInOutSine"></a-sphere>
    <a-plane position="0 1.28 0" rotation="-90 0 0" width="1.9" height=".9" color="#051515" opacity=".9"></a-plane>
    <a-text value="ЭОЛОВА АРФА" position="0 1.25 .01" rotation="-90 0 0" align="center" color="#4ABFBF" width="2.8" font="mozillavr"></a-text>
    <a-text value="1831 год" position="0 1.1 .01" rotation="-90 0 0" align="center" color="#2A8080" width="2.3" font="mozillavr"></a-text>
    <a-text value="Беседка с арфой\nна горе Машук" position="0 .95 .01" rotation="-90 0 0" align="center" color="#B0E0E0" width="2.6" font="mozillavr" line-height="55"></a-text>
  </a-marker>

  <!-- МАРКЕР BARCODE 0 → Провал -->
  <a-marker type="barcode" value="0" emitevents="true" id="m2">
    <a-box position="0 .05 0" width="2" height=".07" depth="2" color="#0D0818" opacity=".95"></a-box>
    <a-cylinder position="0 .65 0" radius=".38" height="1.3" color="#6A0F8E" opacity=".3" open-ended="true"></a-cylinder>
    <a-sphere position="0 1.4 0" radius=".22" color="#9B59B6" opacity=".8" wireframe="true" animation="property:rotation;to:360 360 0;dur:5500;loop:true;easing:linear"></a-sphere>
    <a-plane position="0 1.28 0" rotation="-90 0 0" width="1.9" height=".9" color="#080512" opacity=".92"></a-plane>
    <a-text value="ПРОВАЛ" position="0 1.25 .01" rotation="-90 0 0" align="center" color="#9B59B6" width="2.8" font="mozillavr"></a-text>
    <a-text value="1837 год" position="0 1.1 .01" rotation="-90 0 0" align="center" color="#6A0F8E" width="2.3" font="mozillavr"></a-text>
    <a-text value="Подземное озеро\nсинего цвета" position="0 .95 .01" rotation="-90 0 0" align="center" color="#D7B4F3" width="2.6" font="mozillavr" line-height="55"></a-text>
  </a-marker>

  <a-entity camera></a-entity>
</a-scene>

<!-- UI -->
<a href="index.html" id="back">← Назад</a>
<div id="status">Загрузка...</div>
<div id="reticle">
  <div class="rc tl"></div><div class="rc tr"></div>
  <div class="rc bl"></div><div class="rc br"></div>
</div>
<div id="hint">
  <div id="hint-main">Наведи камеру на маркер</div>
  <div id="hint-links">
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" target="_blank">HIRO</a> ·
    <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/kanji.png" target="_blank">KANJI</a>
  </div>
</div>

<!-- Карточка объекта -->
<div id="card">
  <button id="card-close" onclick="closeCard()">✕</button>
  <div id="card-head">
    <div id="card-tag"></div>
    <div id="card-title"></div>
    <div id="card-year"></div>
  </div>
  <div id="card-body">
    <p id="card-text"></p>
    <div id="card-actions">
      <button class="cbtn" id="audio-btn" onclick="toggleAudio()">🎧 Слушать рассказ</button>
    </div>
  </div>
</div>

<script>
const PLACES = [
  {
    tag: 'Объект #01 · Литература', title: 'Домик Лермонтова', year: 'Пятигорск, 1841 год',
    text: 'Небольшой саманный домик, где Лермонтов провёл последние два месяца жизни. 15 июля 1841 года поэт был убит на дуэли у подножия горы Машук. Сегодня здесь работает музей-заповедник.',
    audio: 'Домик Лермонтова. Небольшой саманный домик, где Михаил Юрьевич Лермонтов провёл последние два месяца своей жизни. Пятнадцатого июля тысяча восемьсот сорок первого года поэт был убит на дуэли с Мартыновым у подножия горы Машук. Поэту было двадцать шесть лет.'
  },
  {
    tag: 'Объект #02 · Архитектура', title: 'Эолова Арфа', year: 'Пятигорск, 1831 год',
    text: 'Беседка-ротонда на обрыве горы Машук, построена братьями Бернардацци. Внутри была настоящая эолова арфа — инструмент, звучащий от ветра. В тихие ночи жители снизу слышали таинственную музыку.',
    audio: 'Эолова Арфа. Изящная беседка-ротонда на обрыве горы Машук, построенная в тысяча восемьсот тридцать первом году. Внутри была настоящая эолова арфа — инструмент, звучащий от ветра. В тихие ночи жители снизу слышали таинственную музыку.'
  },
  {
    tag: 'Объект #03 · Природа', title: 'Провал', year: 'Пятигорск, карстовое озеро',
    text: 'Подземное карстовое озеро с водой пронзительно синего цвета. Глубина — 41 метр. В 1857 году прорыли тоннель. Остап Бендер из «Золотого телёнка» продавал здесь билеты.',
    audio: 'Провал. Уникальное подземное карстовое озеро с водой пронзительно синего цвета. Глубина — сорок один метр. В тысяча восемьсот пятьдесят седьмом году прорыли тоннель. Остап Бендер из Золотого телёнка продавал здесь билеты на вход.'
  }
];

let currentPlace = null, speaking = false;

// Статус загрузки сцены
const scene = document.querySelector('a-scene');
scene.addEventListener('loaded', () => {
  document.getElementById('status').textContent = 'Ищу маркер...';
  document.getElementById('status').style.color = 'rgba(255,255,255,.5)';
});

// Привязка маркеров — с retry чтобы точно поймать после загрузки
function attachMarkers() {
  PLACES.forEach((place, i) => {
    const el = document.getElementById('m' + i);
    if (!el || el._attached) return;
    el._attached = true;
    el.addEventListener('markerFound', () => {
      document.getElementById('reticle').style.opacity = '0';
      const st = document.getElementById('status');
      st.textContent = '✦ ' + place.title;
      st.classList.add('found');
      showCard(i);
    });
    el.addEventListener('markerLost', () => {
      document.getElementById('reticle').style.opacity = '1';
      const st = document.getElementById('status');
      st.textContent = 'Ищу маркер...';
      st.classList.remove('found');
    });
  });
}

scene.addEventListener('loaded', attachMarkers);
setTimeout(attachMarkers, 1500);
setTimeout(attachMarkers, 3000);

function showCard(i) {
  const p = PLACES[i];
  currentPlace = p;
  document.getElementById('card-tag').textContent = p.tag;
  document.getElementById('card-title').textContent = p.title;
  document.getElementById('card-year').textContent = p.year;
  document.getElementById('card-text').textContent = p.text;
  resetAudio();
  document.getElementById('card').classList.add('show');
  setTimeout(() => speak(p.audio), 600);
}

function closeCard() {
  document.getElementById('card').classList.remove('show');
  stopAudio();
}

function toggleAudio() {
  speaking ? stopAudio() : (currentPlace && speak(currentPlace.audio));
}

function speak(text) {
  if (!window.speechSynthesis) return;
  stopAudio();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ru-RU'; u.rate = 0.88;
  const ru = speechSynthesis.getVoices().find(v => v.lang.startsWith('ru'));
  if (ru) u.voice = ru;
  u.onend = u.onerror = resetAudio;
  speaking = true;
  const btn = document.getElementById('audio-btn');
  btn.classList.add('playing');
  btn.innerHTML = '<span class="wave"><span></span><span></span><span></span><span></span></span>Воспроизведение...';
  speechSynthesis.speak(u);
}

function resetAudio() {
  speaking = false;
  const btn = document.getElementById('audio-btn');
  if (btn) { btn.classList.remove('playing'); btn.textContent = '🎧 Слушать рассказ'; }
}

function stopAudio() {
  if (window.speechSynthesis) speechSynthesis.cancel();
  speaking = false;
  resetAudio();
}

function closeCard() {
  stopAudio();
  document.getElementById('card').classList.remove('show');
  currentPlace = null;
}

if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
